name: Sync Telegram Photos

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python scripts/sync_telegram.py

      - name: Commit changes
        run: |
          git config user.name "telegram-sync-bot"
          git config user.email "telegram-sync-bot@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Sync Telegram photos"
          git push

